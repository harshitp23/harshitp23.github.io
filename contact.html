<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Harshit's Website</title>
    <script>
        (function() {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-body: #444; --bg-hero: #00796b; --bg-header: #000; --text-main: #ffffff; --accent: #ff9800; --card-bg: rgba(255, 255, 255, 0.1); --dropdown-bg: #111b2d; }
        [data-theme="dark"] { --bg-body: #121212; --bg-hero: #1a1a1a; --text-main: #e0e0e0; --accent: #bb86fc; }
        [data-theme="badger"] { --bg-body: #f4f4f4; --bg-hero: #c5050c; --bg-header: #282828; --text-main: #282828; --accent: #c5050c; }
        [data-theme="ocean"] { --bg-body: #001219; --bg-hero: #005f73; --bg-header: #001219; --text-main: #e9d8a6; --accent: #94d2bd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { min-height: 100%; background-color: var(--bg-body); }
        body { font-family: 'Poppins', sans-serif; color: var(--text-main); display: flex; flex-direction: column; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        header { background: var(--bg-header); padding: 20px 0; text-align: center; position: relative; }
        .logo-text { font-size: 1.6rem; font-weight: 700; color: white; display: block; margin-bottom: 10px; }
        nav { display: flex; justify-content: center; gap: 25px; }
        nav a { color: #ccc; text-decoration: none; font-size: 0.95rem; font-weight: 600; }
        nav a.active { color: var(--accent); }
        .theme-container { position: absolute; right: 30px; top: 25px; }
        .palette-btn { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
        .theme-dropdown { position: absolute; top: 55px; right: 0; width: 220px; background: var(--dropdown-bg); border-radius: 12px; padding: 10px; display: none; flex-direction: column; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .theme-dropdown.show { display: flex; }
        .theme-opt { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; border-radius: 8px; cursor: pointer; color: white; }
        .radio-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #334155; transition: 0.2s; }
        .theme-opt.active .radio-dot { background: var(--accent); border-color: var(--accent); box-shadow: inset 0 0 0 3px var(--dropdown-bg); }
        main { flex: 1; padding-bottom: 60px; }
        .hero { background-color: var(--bg-hero); padding: 60px 20px; text-align: center; color: #fff; margin-bottom: 40px; }
        .contact-container { max-width: 1100px; margin: 0 auto; padding: 0 20px; text-align: center; }
        .contact-info-card { background: var(--card-bg); padding: 40px; border-radius: 25px; margin-bottom: 50px; display: inline-block; width: 100%; max-width: 600px; }
        .email-link a { color: var(--text-main); font-weight: 600; text-decoration: none; }
        .email-link a:hover { color: var(--accent); }
        footer { background: #000; color: #888; padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <header>
        <span class="logo-text">Harshit's Website</span>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="hobbies.html">Hobbies</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
        <div class="theme-container">
            <button class="palette-btn" onclick="toggleThemeMenu()">🎨</button>
            <div class="theme-dropdown" id="themeMenu">
                <div class="theme-label">THEME</div>
                <div class="theme-opt" id="opt-dark" onclick="setTheme('dark')"><span>🌙 Dark</span><div class="radio-dot"></div></div>
                <div class="theme-opt" id="opt-light" onclick="setTheme('light')"><span>☀️ Light</span><div class="radio-dot"></div></div>
                <div class="theme-opt" id="opt-badger" onclick="setTheme('badger')"><span>🦡 Badger</span><div class="radio-dot"></div></div>
                <div class="theme-opt" id="opt-ocean" onclick="setTheme('ocean')"><span>🌊 Ocean</span><div class="radio-dot"></div></div>
            </div>
        </div>
    </header>
    <main>
        <section class="hero"><h1>Contact Me</h1></section>
        <div class="contact-container">
            <div class="contact-info-card">
                <h2>Let's Connect!</h2>
                <p class="email-link">📧 <a href="mailto:prithiani@wisc.edu">prithiani@wisc.edu</a></p>
                <p class="email-link">📧 <a href="mailto:harshitprithiani@gmail.com">harshitprithiani@gmail.com</a></p>
            </div>
        </div>
    </main>
    <footer><p>© 2026 Harshit Prithiani</p></footer>
    <script>
        function toggleThemeMenu() { document.getElementById('themeMenu').classList.toggle('show'); }
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.getElementById('themeMenu').classList.remove('show');
            document.querySelectorAll('.theme-opt').forEach(opt => opt.classList.remove('active'));
            document.getElementById('opt-' + theme).classList.add('active');
        }
        window.onload = () => setTheme(localStorage.getItem('theme') || 'light');
    </script>
</body>
</html>
